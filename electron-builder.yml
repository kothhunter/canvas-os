appId: com.canvas-dashboard
productName: Canvas Dashboard
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!out/renderer/**/*"
extraResources:
  - from: out/renderer
    to: renderer
asarUnpack:
  - "**/*.node"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.education
  darkModeSupport: true
